        <line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/>
      </g>
      <text x="96" y="514" font-size="7" font-weight="700" fill="#f97316" text-anchor="middle">Stoppuhr</text>

      <!-- Analyse (BarChart2) -->
      <g transform="translate(150.6,484) scale(0.78)" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>
      </g>
      <text x="160" y="514" font-size="7" font-weight="700" fill="#94a3b8" text-anchor="middle">Analyse</text>

      <!-- Wissen (BookOpen) -->
      <g transform="translate(214.6,484) scale(0.78)" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </g>
      <text x="224" y="514" font-size="7" font-weight="700" fill="#94a3b8" text-anchor="middle">Wissen</text>
