      <circle cx="231" cy="52" r="13" fill="#1e293b"/>
      <g transform="translate(224.2,45.2) scale(0.575)" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
