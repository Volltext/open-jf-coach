      <rect x="18" y="380" width="220" height="26" rx="12" fill="#0f172a"/>
      <text x="30" y="397" font-size="9" font-weight="500" fill="#f8fafc">zu Wasser</text>
      <text x="206" y="397" font-size="9.5" font-weight="700" fill="#f8fafc" text-anchor="end" font-family="ui-monospace, monospace">01:12,4</text>
