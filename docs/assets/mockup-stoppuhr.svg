      <rect x="10" y="424" width="236" height="40" rx="20" fill="#1e293b" stroke="#94a3b8" stroke-opacity="0.2"/>
      <text x="24" y="442" font-size="11" font-weight="700" fill="#f8fafc">Notizen zum Lauf</text>
      <rect x="24" y="448" width="208" height="9" rx="4" fill="#0f172a"/>

      <!-- .bottom-navigation -->
      <rect x="0" y="470" width="256" height="64" fill="#020617" fill-opacity="0.96"/>
      <line x1="0" y1="470" x2="256" y2="470" stroke="#94a3b8" stroke-opacity="0.2"/>
      <!-- aktive .active::before Indikatorleiste über Stoppuhr -->
