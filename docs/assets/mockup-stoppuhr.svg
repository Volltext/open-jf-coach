      </g>
      <text x="70" y="365" font-size="9" font-weight="600" fill="#f8fafc" text-anchor="middle">zu Wasser</text>
      <rect x="134" y="328" width="104" height="44" rx="12" fill="#334155"/>
      <g transform="translate(178,333) scale(0.62)" stroke="#f8fafc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </g>
      <text x="186" y="365" font-size="9" font-weight="600" fill="#f8fafc" text-anchor="middle">Knoten Start</text>
