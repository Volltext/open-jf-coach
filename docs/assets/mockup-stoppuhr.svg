<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="appbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="35%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <clipPath id="screen">
      <rect x="0" y="0" width="256" height="534" rx="44"/>
    </clipPath>
  </defs>

  <!-- glow -->
  <ellipse cx="160" cy="300" rx="150" ry="150" fill="url(#glow)"/>

  <!-- phone body -->
  <g transform="translate(22,33)">
    <rect x="0" y="0" width="256" height="534" rx="44" fill="#020617" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>

    <g clip-path="url(#screen)">
      <rect x="0" y="0" width="256" height="534" fill="url(#appbg)"/>

      <!-- status bar -->
      <rect x="87" y="-2" width="82" height="24" rx="12" fill="#020617"/>
      <text x="18" y="23" font-size="11" font-weight="700" fill="#ffffff" fill-opacity="0.85">9:41</text>
      <!-- signal -->
      <rect x="206" y="16" width="2.5" height="4" rx="0.5" fill="#ffffff" fill-opacity="0.7"/>
      <rect x="210" y="13" width="2.5" height="7" rx="0.5" fill="#ffffff" fill-opacity="0.7"/>
      <rect x="214" y="10" width="2.5" height="10" rx="0.5" fill="#ffffff" fill-opacity="0.7"/>
      <rect x="218" y="8" width="2.5" height="12" rx="0.5" fill="#ffffff" fill-opacity="0.35"/>
      <!-- battery -->
      <rect x="226" y="11" width="16" height="9" rx="2" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
      <rect x="227.5" y="12.5" width="11" height="6" rx="1" fill="#ffffff" fill-opacity="0.75"/>
      <rect x="242.5" y="13.5" width="1.8" height="4" rx="0.8" fill="#ffffff" fill-opacity="0.32"/>

      <!-- topbar gear -->
      <rect x="222" y="40" width="22" height="22" rx="7" fill="#1e293b" fill-opacity="0.55"/>
      <circle cx="233" cy="51" r="3" stroke="#94a3b8" stroke-width="1.3"/>
      <circle cx="233" cy="51" r="6" stroke="#94a3b8" stroke-width="1.3" stroke-opacity="0.55" stroke-dasharray="2 2.5"/>

      <!-- sync banner -->
      <rect x="10" y="72" width="236" height="22" rx="9" fill="#1e293b" fill-opacity="0.86" stroke="#94a3b8" stroke-opacity="0.2"/>
      <circle cx="22" cy="83" r="3" fill="#10b981"/>
      <text x="32" y="86.5" font-size="8.5" fill="#6ee7b7"><tspan font-weight="800">Sync:</tspan> Verbunden</text>

      <!-- section head -->
      <text x="14" y="116" font-size="16" font-weight="800" fill="#f8fafc">Stoppuhr</text>
      <rect x="188" y="101" width="56" height="20" rx="8" fill="#1e293b"/>
      <rect x="190" y="103" width="26" height="16" rx="6" fill="#f97316"/>
      <text x="203" y="115" font-size="9" font-weight="700" fill="#1a0f04" text-anchor="middle">A</text>
      <text x="230" y="115" font-size="9" font-weight="700" fill="#94a3b8" text-anchor="middle">B</text>

      <!-- timer card -->
      <rect x="10" y="126" width="236" height="98" rx="12" fill="#1e293b" fill-opacity="0.94" stroke="#94a3b8" stroke-opacity="0.2"/>
      <text x="128" y="150" font-size="8" font-weight="700" letter-spacing="1" fill="#94a3b8" text-anchor="middle">A-TEIL LAUF</text>
      <text x="128" y="187" font-size="34" font-weight="700" fill="#f8fafc" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace">02:34,7</text>
      <rect x="53" y="197" width="150" height="20" rx="9" fill="#0f172a" fill-opacity="0.72"/>
      <text x="63" y="211" font-size="8" fill="#94a3b8" text-anchor="start">Knotenzeit</text>
      <text x="193" y="211" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="end">00:28,3 <tspan font-weight="500" fill="#94a3b8" font-size="7">läuft</tspan></text>

      <!-- actions -->
      <rect x="10" y="230" width="140" height="56" rx="10" fill="#10b981"/>
      <text x="80" y="264" font-size="18" font-weight="800" fill="#052e16" text-anchor="middle">START</text>
      <rect x="158" y="230" width="88" height="26" rx="8" fill="#334155"/>
      <text x="202" y="247" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Reset</text>
      <rect x="158" y="260" width="88" height="26" rx="8" fill="#2563eb"/>
      <text x="202" y="277" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Speichern</text>

      <!-- splits card -->
      <rect x="10" y="296" width="236" height="72" rx="12" fill="#1e293b" fill-opacity="0.94" stroke="#94a3b8" stroke-opacity="0.2"/>
      <text x="22" y="315" font-size="8" font-weight="700" letter-spacing="0.8" fill="#94a3b8">ZWISCHENZEITEN</text>
      <rect x="18" y="320" width="106" height="40" rx="9" fill="#334155"/>
      <text x="71" y="344" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">zu Wasser</text>
      <rect x="132" y="320" width="106" height="40" rx="9" fill="#334155"/>
      <text x="185" y="344" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Knoten Start</text>

      <!-- dots -->
      <circle cx="114" cy="384" r="2.5" fill="#ffffff" fill-opacity="0.2"/>
      <rect x="122" y="381.5" width="14" height="5" rx="2.5" fill="#f97316"/>
      <circle cx="144" cy="384" r="2.5" fill="#ffffff" fill-opacity="0.2"/>
      <circle cx="152" cy="384" r="2.5" fill="#ffffff" fill-opacity="0.2"/>

      <!-- bottom nav -->
      <line x1="0" y1="480" x2="256" y2="480" stroke="#94a3b8" stroke-opacity="0.16"/>
      <rect x="0" y="480" width="256" height="54" fill="#020617" fill-opacity="0.96"/>
      <rect x="89" y="483" width="14" height="2.5" rx="1.5" fill="#f97316"/>

      <!-- tab: Aufstellung -->
      <circle cx="29" cy="500" r="2.6" stroke="#94a3b8" stroke-width="1.3"/>
      <circle cx="35" cy="500" r="2.6" stroke="#94a3b8" stroke-width="1.3"/>
      <text x="32" y="519" font-size="6.5" font-weight="700" fill="#94a3b8" text-anchor="middle">Aufstellung</text>

      <!-- tab: Stoppuhr (active) -->
      <circle cx="96" cy="500" r="5.5" stroke="#f97316" stroke-width="1.5"/>
      <path d="M96 497 V500 L98 502" stroke="#f97316" stroke-width="1.3" stroke-linecap="round"/>
      <text x="96" y="519" font-size="6.5" font-weight="700" fill="#f97316" text-anchor="middle">Stoppuhr</text>

      <!-- tab: Analyse -->
      <rect x="153" y="500" width="2.6" height="5" rx="0.6" fill="#94a3b8"/>
      <rect x="158.5" y="496" width="2.6" height="9" rx="0.6" fill="#94a3b8"/>
      <rect x="164" y="498" width="2.6" height="7" rx="0.6" fill="#94a3b8"/>
      <text x="160" y="519" font-size="6.5" font-weight="700" fill="#94a3b8" text-anchor="middle">Analyse</text>

      <!-- tab: Wissen -->
      <path d="M218 496 h5 a2 2 0 0 1 2 2 v8 a1.5 1.5 0 0 0 -1.5 -1.5 H218 Z M230 496 h-5 a2 2 0 0 0 -2 2 v8 a1.5 1.5 0 0 1 1.5 -1.5 H230 Z" stroke="#94a3b8" stroke-width="1.1" fill="none" stroke-linejoin="round"/>
      <text x="224" y="519" font-size="6.5" font-weight="700" fill="#94a3b8" text-anchor="middle">Wissen</text>
    </g>
  </g>
</svg>
